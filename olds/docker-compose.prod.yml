# ===========================================
# Docker Compose - Production Override
# Collectivites Territoriales
# Domain: kaominina-mangarahara.mg
# ===========================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # PostgreSQL Database - Port 5433 pour éviter conflit avec site_principale
  db:
    container_name: ct_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ct_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-collectivites_db}

  # FastAPI Backend - Port 8081 pour éviter conflit
  backend:
    container_name: ct_backend
    ports:
      - "8081:8000"
    environment:
      - APP_NAME=Plateforme Collectivites Territoriales
      - APP_VERSION=1.0.0
      - DEBUG=${DEBUG:-False}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - POSTGRES_USER=${POSTGRES_USER:-ct_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-collectivites_db}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_MINUTES=${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      # CORS pour HTTP (initial) et HTTPS (apres SSL)
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://kaominina-mangarahara.mg","https://kaominina-mangarahara.mg","http://www.kaominina-mangarahara.mg","https://www.kaominina-mangarahara.mg","http://164.68.112.108:8080"]}
      - FRONTEND_URL=${FRONTEND_URL:-https://kaominina-mangarahara.mg}
      - BACKEND_URL=${BACKEND_URL:-https://kaominina-mangarahara.mg/api}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-20}
      - UPLOAD_DIR=/app/uploads
      - FIRST_SUPERUSER_EMAIL=${FIRST_SUPERUSER_EMAIL:-admin@ti-madagascar.org}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:-changeme123}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs

  # Nuxt Frontend - Accessible sur port 8080
  frontend:
    container_name: ct_frontend
    build:
      args:
        # API via le domaine (Nginx fait le proxy vers backend:8081)
        - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL:-https://kaominina-mangarahara.mg/api}
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL:-https://kaominina-mangarahara.mg/api}

  # Migrations - Profil séparé
  migrations:
    container_name: ct_migrations
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ct_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-collectivites_db}

# Volumes nommés différemment pour éviter conflits
volumes:
  postgres_data:
    name: ct_postgres_data
  backend_uploads:
    name: ct_uploads
  backend_logs:
    name: ct_logs

# Network renommé pour éviter conflits
networks:
  app_network:
    name: ct_network
    driver: bridge
