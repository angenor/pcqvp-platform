<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCQVP - Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e94560;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.8;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#9881;</div>
        <h1>Maintenance en cours</h1>
        <p>La plateforme PCQVP est temporairement indisponible pour maintenance. Veuillez revenir dans quelques minutes.</p>
    </div>
</body>
</html>
